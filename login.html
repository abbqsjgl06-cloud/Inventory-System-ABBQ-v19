<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes">
<title>Login — Inventory ABBQ Indonesia</title>
<link rel="icon" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared/inv-style.css?v=18">
<style>
  body{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;
  }
  .login-box{
    background:#fff;border:1px solid var(--line);border-radius:16px;
    padding:28px 24px;width:100%;max-width:360px;
  }
  .login-logo{display:block;margin:0 auto 16px;width:64px;height:64px;object-fit:contain;}
  .login-title{text-align:center;font-size:18px;font-weight:800;margin-bottom:4px;}
  .login-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:20px;}
</style>
</head>
<body>

<div class="login-box">
  <img src="logo.png" class="login-logo" alt="ABBQ">
  <div class="login-title">Inventory ABBQ Indonesia</div>
  <div class="login-sub">Masuk untuk melanjutkan</div>

  <div class="field">
    <label>Username</label>
    <input type="text" id="loginUser" autocomplete="off" placeholder="admin atau user">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="loginPass" autocomplete="off">
  </div>
  <button class="btn btn-primary" onclick="attemptLogin()">Masuk</button>
  <p id="loginError" style="display:none;color:#C23B2E;font-size:13px;margin-top:10px;text-align:center;"></p>
</div>

<div class="notif" id="notif"></div>

<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-auth-compat.js"></script>
<script src="shared/firebase-config.js?v=40"></script>
<script src="login.js?v=40"></script>
</body>
</html>
